site_name: "Global Imagine OS Protocol (GIOP)"
site_description: "The unified, formula-defined imaging protocol — connecting every camera, lens, and display through a single mathematical truth."
site_author: "Founder, GIOP"
repo_url: https://github.com/agrabaad/Global-Imagine-OS
repo_name: "GitHub"

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  features:
    - navigation.instant
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - pymdownx.details

plugins:
  - search

nav:
  - Home: index.md
